<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>건축물 인증 대상 판정</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  :root{
    --blue:#3182F6;
    --blue-weak:#E8F3FF;
    --blue-press:#1B64DA;
    --red:#F04452;
    --red-weak:#FEF1F1;
    --text:#191F28;
    --sub:#4E5968;
    --tertiary:#8B95A1;
    --disabled:#B0B8C1;
    --line:#E5E8EB;
    --fill:#F2F4F6;
    --bg:#F9FAFB;
    --card:#FFFFFF;
    --radius:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{-webkit-text-size-adjust:100%;}
  body{
    font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,Roboto,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:var(--bg);
    color:var(--text);
    line-height:1.5;
    letter-spacing:-0.02em;
    font-feature-settings:'tnum';
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 20px 120px;}

  /* ── 헤더 ── */
  header{padding:44px 0 28px;}
  .eyebrow{
    font-size:13px;font-weight:600;color:var(--blue);
    margin-bottom:10px;letter-spacing:0;
  }
  h1{
    font-size:28px;font-weight:700;line-height:1.35;
    letter-spacing:-0.035em;
  }
  h1 em{font-style:normal;color:var(--blue);}
  .lede{margin-top:12px;font-size:15px;color:var(--tertiary);font-weight:500;}

  /* ── 섹션 ── */
  .sec-title{
    font-size:13px;font-weight:700;color:var(--tertiary);
    margin:32px 4px 12px;letter-spacing:0;
  }

  /* ── 입력 카드 ── */
  .card{
    background:var(--card);border-radius:var(--radius);
    padding:24px 20px;
  }
  .field + .field{margin-top:26px;}
  .label{
    display:flex;align-items:baseline;justify-content:space-between;
    font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;
  }
  .label .hint{font-size:12px;font-weight:500;color:var(--disabled);letter-spacing:0;}

  .chips{display:flex;flex-wrap:wrap;gap:8px;}
  .chip{
    border:none;cursor:pointer;
    background:var(--fill);color:var(--sub);
    font:inherit;font-size:14px;font-weight:600;
    padding:10px 16px;border-radius:12px;
    transition:background .15s ease,color .15s ease,transform .08s ease;
  }
  .chip:hover{background:#E8EBED;}
  .chip:active{transform:scale(.96);}
  .chip[aria-pressed="true"]{background:var(--blue);color:#fff;}
  .chip:focus-visible{outline:2px solid var(--blue);outline-offset:2px;}

  .numrow{
    display:flex;align-items:center;gap:6px;
    border-bottom:2px solid var(--line);padding-bottom:10px;
    transition:border-color .15s ease;
  }
  .numrow:focus-within{border-color:var(--blue);}
  .numrow input{
    flex:1;min-width:0;border:none;outline:none;background:transparent;
    font:inherit;font-size:26px;font-weight:700;letter-spacing:-0.03em;
    color:var(--text);
  }
  .numrow input::-webkit-outer-spin-button,
  .numrow input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .numrow input[type=number]{-moz-appearance:textfield;}
  .unit{font-size:17px;font-weight:600;color:var(--disabled);flex-shrink:0;}

  .quick{display:flex;gap:6px;margin-top:10px;}
  .quick button{
    border:none;cursor:pointer;background:transparent;color:var(--blue);
    font:inherit;font-size:13px;font-weight:600;padding:5px 9px;
    border-radius:8px;
  }
  .quick button:hover{background:var(--blue-weak);}

  /* ── 요약 ── */
  .summary{
    background:var(--card);border-radius:var(--radius);
    padding:26px 22px;margin-top:12px;
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .summary .cap{font-size:14px;font-weight:600;color:var(--sub);}
  .summary .big{
    font-size:40px;font-weight:800;letter-spacing:-0.04em;line-height:1.15;
    margin-top:4px;
  }
  .summary .big b{color:var(--blue);font-weight:800;}
  .summary .big span{color:var(--disabled);font-size:26px;font-weight:700;}
  .donut{flex-shrink:0;}
  .donut circle{fill:none;stroke-linecap:round;}
  .donut .track{stroke:var(--fill);}
  .donut .val{stroke:var(--blue);transition:stroke-dashoffset .5s cubic-bezier(.22,1,.36,1);}

  /* ── 결과 리스트 ── */
  .list{margin-top:12px;display:flex;flex-direction:column;gap:10px;}
  .item{
    background:var(--card);border-radius:16px;
    padding:18px 20px;position:relative;overflow:hidden;
    transition:opacity .2s ease;
  }
  .item.off{opacity:.55;}
  .item::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:4px;
    background:var(--blue);transform:scaleY(0);transform-origin:center;
    transition:transform .35s cubic-bezier(.22,1,.36,1);
  }
  .item.on::before{transform:scaleY(1);}
  .item-head{display:flex;align-items:center;justify-content:space-between;gap:12px;}
  .name{font-size:16px;font-weight:700;letter-spacing:-0.03em;}
  .badge{
    flex-shrink:0;font-size:12px;font-weight:700;padding:5px 10px;border-radius:8px;
    letter-spacing:0;
  }
  .badge.yes{background:var(--blue-weak);color:var(--blue);}
  .badge.no{background:var(--fill);color:var(--disabled);}
  .grade{
    margin-top:10px;font-size:15px;font-weight:600;color:var(--text);
    letter-spacing:-0.025em;
  }
  .item.off .grade{color:var(--disabled);font-weight:500;}
  .meta{
    margin-top:12px;padding-top:12px;border-top:1px solid var(--line);
    display:flex;flex-direction:column;gap:5px;
  }
  .meta div{font-size:12.5px;color:var(--tertiary);font-weight:500;letter-spacing:-0.01em;}
  .meta b{color:var(--sub);font-weight:600;margin-right:6px;}
  .note{
    margin-top:10px;background:var(--red-weak);color:var(--red);
    font-size:12.5px;font-weight:600;padding:9px 12px;border-radius:10px;
    letter-spacing:-0.01em;
  }

  /* ── 참고표 토글 ── */
  details.ref{
    margin-top:12px;background:var(--card);border-radius:16px;
    padding:0 20px;overflow:hidden;
  }
  details.ref summary{
    list-style:none;cursor:pointer;padding:18px 0;
    font-size:15px;font-weight:600;
    display:flex;align-items:center;justify-content:space-between;
  }
  details.ref summary::-webkit-details-marker{display:none;}
  details.ref summary::after{
    content:"";width:8px;height:8px;border-right:2px solid var(--disabled);
    border-bottom:2px solid var(--disabled);transform:rotate(45deg);
    margin-right:4px;transition:transform .2s ease;
  }
  details.ref[open] summary::after{transform:rotate(-135deg);}
  .ref-body{padding-bottom:18px;}
  .ref-block{padding:14px 0;border-top:1px solid var(--line);}
  .ref-block h3{font-size:14px;font-weight:700;letter-spacing:-0.03em;}
  .ref-block .scope{font-size:12px;color:var(--tertiary);font-weight:500;margin-top:3px;}
  .ref-block ul{list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:6px;}
  .ref-block li{
    display:flex;gap:10px;font-size:13px;
    background:var(--fill);border-radius:8px;padding:7px 10px;
  }
  .ref-block li b{flex-shrink:0;width:70px;font-weight:700;color:var(--sub);}
  .ref-block li span{color:var(--tertiary);font-weight:500;}
  .ref-block .law{margin-top:9px;font-size:11.5px;color:var(--disabled);font-weight:500;white-space:pre-line;}

  footer{margin-top:28px;text-align:center;font-size:12px;color:var(--disabled);font-weight:500;line-height:1.7;}

  @media (max-width:400px){
    h1{font-size:25px;}
    .summary .big{font-size:34px;}
  }
  @media (prefers-reduced-motion:reduce){
    *{transition:none !important;animation:none !important;}
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">건축물 인증 대상 판정</div>
    <h1>이 건물,<br /><em>어떤 인증</em>을 받아야 할까요?</h1>
    <p class="lede">공사 조건을 입력하면 9개 인증의 해당 여부와 적용 등급을 바로 확인할 수 있습니다.</p>
  </header>

  <div class="sec-title">공사 조건</div>
  <div class="card">
    <div class="field">
      <div class="label"><span>공사 유형</span></div>
      <div class="chips" id="chips-type"></div>
    </div>

    <div class="field">
      <div class="label"><span>연면적</span><span class="hint">증·개축은 전체 연면적 기준</span></div>
      <div class="numrow">
        <input id="area" type="number" inputmode="numeric" min="0" step="10" value="500" />
        <span class="unit">㎡</span>
      </div>
      <div class="quick" id="quick"></div>
    </div>

    <div class="field">
      <div class="label"><span>시설 용도</span></div>
      <div class="chips" id="chips-use"></div>
    </div>

    <div class="field">
      <div class="label"><span>공공건축물</span><span class="hint">에너지절약계획서 EPI 기준</span></div>
      <div class="chips" id="chips-public"></div>
    </div>

    <div class="field">
      <div class="label"><span>설치계획서 접수 연도</span><span class="hint">한국에너지공단 접수일 기준</span></div>
      <div class="numrow">
        <input id="year" type="number" inputmode="numeric" min="2020" max="2040" step="1" value="2026" />
        <span class="unit">년</span>
      </div>
    </div>
  </div>

  <div class="sec-title">판정 결과</div>
  <div class="summary">
    <div>
      <div class="cap">받아야 하는 인증</div>
      <div class="big"><b id="cnt">0</b><span> / 9개</span></div>
    </div>
    <svg class="donut" width="72" height="72" viewBox="0 0 72 72" aria-hidden="true">
      <circle class="track" cx="36" cy="36" r="30" stroke-width="8" />
      <circle class="val" id="arc" cx="36" cy="36" r="30" stroke-width="8"
              stroke-dasharray="188.5" stroke-dashoffset="188.5"
              transform="rotate(-90 36 36)" />
    </svg>
  </div>

  <div class="list" id="list"></div>

  <details class="ref">
    <summary>인증 기준 총괄표 보기</summary>
    <div class="ref-body" id="ref"></div>
  </details>

  <footer>
    본 판정은 참고용이며, 설계 조건에 따라 제출 대상 여부가 달라질 수 있습니다.<br />
    최종 적용 기준은 관계 법령과 인증기관 확인이 필요합니다.
  </footer>
</div>

<script>
const TYPES  = ['신축','증축','개축','리모델링'];
const USES   = ['학교(유치원·초·중등)','학생수련원·도서관','대학시설 등','업무시설(청사)','기타'];
const PUBLIC = ['O','X'];

const state = { type:'신축', area:500, use:'학교(유치원·초·중등)', pub:'O', year:2026 };

/* 인증 정의 — 원본 판정표 로직 그대로 */

  },

    grade:s => s.year<=2025 ? '34% (2025년까지)'
             : s.year<=2027 ? '36% (2027년까지)'

/* ── 참고 총괄표 ── */

   rows:[['-','EPI 74점 이상(공공건축물)']], law:'녹색건축물 조성 지원법 제14조\n설계조건에 따라 제출대상 여부 상이'},

   rows:[['최우수','90% 이상'],['우수','80 ~ 90% 미만'],['일반','70 ~ 80% 미만']],

  {n:'범죄예방 환경설계(CPTED)', scope:'신·증·개축 · 리모델링 (필요시)',
   rows:[['최우수','85점 이상'],['우수','70 ~ 85점 미만']], law:'범죄예방 건축기준 고시'},
  {n:'신재생에너지 공급의무비율', scope:'신·증·개축 · 연면적 1,000㎡ 이상',
   rows:[['~2025년','34%'],['~2027년','36%'],['~2029년','38%'],['2030년~','40%']],
   law:'신에너지 및 재생에너지 개발·이용·보급 촉진법 시행령 제15조\n한국에너지공단 전자민원 설치계획서 접수일자 기준'},
  {n:'건물에너지관리시스템(BEMS)', scope:'신·증축 · 연면적 10,000㎡ 이상',
   rows:[['우수 등급','-'],['일반 등급','-']], law:'공공기관 에너지이용 합리화 추진에 관한 규정 제6조'},
  {n:'교육시설 안전인증', scope:'신·증·개축 · 학교 100㎡ / 수련원·도서관 1,000㎡ / 대학 3,000㎡ 이상',
   rows:[['최우수','유치원·초·중등 89점 / 기타 79점 이상'],['우수','유치원·초·중등 78점 / 기타 69점 이상']],
   law:'교육시설안전 인증 운영 규정\n500㎡ 이상 증·개축 시 사용승인 후 2년 이내 재인증 신청'}
];

/* ── 렌더 ── */
function chipGroup(el, items, key){
  el.innerHTML = items.map(v =>
    `<button class="chip" type="button" role="button" data-v="${v}" aria-pressed="${state[key]===v}">${v==='O'?'공공':v==='X'?'민간':v}</button>`
  ).join('');
  el.onclick = e => {
    const b = e.target.closest('.chip'); if(!b) return;
    state[key] = b.dataset.v;
    [...el.children].forEach(c => c.setAttribute('aria-pressed', c===b));
    render();
  };
}

function render(){
  const results = CERTS.map(c => {
    const need  = c.area(state);
    const match = c.types.includes(state.type) && state.area >= need;
    return {c, match, need, grade: match ? c.grade(state) : '해당 없음'};
  });

  const hit = results.filter(r => r.match).length;
  document.getElementById('cnt').textContent = hit;
  const C = 2*Math.PI*30;
  document.getElementById('arc').style.strokeDashoffset = C - (C*hit/9);

  document.getElementById('list').innerHTML = results.map(r => {
    const need = r.need === Infinity ? '대상 아님'
               : r.need === 0 ? '면적 기준 없음'
               : `${r.need.toLocaleString()}㎡ 이상`;
    const alertMsg = r.match && r.c.alert ? r.c.alert(state) : null;
    return `
      <article class="item ${r.match?'on':'off'}">
        <div class="item-head">
          <div class="name">${r.c.name}</div>
          <div class="badge ${r.match?'yes':'no'}">${r.match?'해당':'미해당'}</div>
        </div>
        <div class="grade">${r.grade}</div>
        <div class="meta">
          <div><b>대상</b>${r.c.types.join(' · ')} / ${need}</div>
          <div><b>근거</b>${r.c.law}</div>
          <div><b>비고</b>${r.c.memo}</div>
        </div>
        ${alertMsg ? `<div class="note">${alertMsg}</div>` : ''}
      </article>`;
  }).join('');
}

/* 초기화 */
chipGroup(document.getElementById('chips-type'),   TYPES,  'type');
chipGroup(document.getElementById('chips-use'),    USES,   'use');
chipGroup(document.getElementById('chips-public'), PUBLIC, 'pub');

const quick = document.getElementById('quick');
quick.innerHTML = [100,500,1000,3000,10000].map(v=>`<button type="button" data-v="${v}">${v.toLocaleString()}㎡</button>`).join('');
quick.onclick = e => {
  const b = e.target.closest('button'); if(!b) return;
  state.area = +b.dataset.v;
  document.getElementById('area').value = state.area;
  render();
};

document.getElementById('area').addEventListener('input', e => {
  state.area = Math.max(0, +e.target.value || 0); render();
});
document.getElementById('year').addEventListener('input', e => {
  state.year = +e.target.value || 2026; render();
});

document.getElementById('ref').innerHTML = REF.map(r => `
  <div class="ref-block">
    <h3>${r.n}</h3>
    <div class="scope">${r.scope}</div>
    <ul>${r.rows.map(([a,b])=>`<li><b>${a}</b><span>${b}</span></li>`).join('')}</ul>
    <div class="law">${r.law}</div>
  </div>`).join('');

render();
</script>
</body>
</html>
